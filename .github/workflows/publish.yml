name: Publish apt archive
on:
  repository_dispatch:
    types: [publish-packages]
  workflow_dispatch: {}
concurrency:
  group: apt-publish        # single writer, queued
  cancel-in-progress: false
jobs:
  publish:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Import signing key
        run: echo "${{ secrets.APT_GPG_KEY }}" | gpg --batch --import
      - name: Pull current pool from R2
        env:
          CLOUDFLARE_API_TOKEN: "${{ secrets.CLOUDFLARE_API_TOKEN }}"
          CLOUDFLARE_ACCOUNT_ID: "${{ vars.CLOUDFLARE_ACCOUNT_ID }}"
        run: |
          mkdir -p repo/pool
          npx wrangler r2 object get openpolycom-apt/pool --remote --pipe 2>/dev/null || true
          # wrangler has no recursive get; list + fetch each pool object.
          for k in $(npx wrangler r2 bucket info openpolycom-apt >/dev/null 2>&1; \
                     npx wrangler r2 object list openpolycom-apt --prefix pool/ 2>/dev/null \
                     | grep -oE 'pool/[^" ]+\.deb' | sort -u); do
            npx wrangler r2 object get "openpolycom-apt/$k" --file "repo/$k" --remote
          done
      - name: Fetch dispatched debs
        if: github.event_name == 'repository_dispatch'
        run: |
          echo '${{ toJson(github.event.client_payload) }}' > payload.json
          # client_payload: { "run_id": ..., "repo": "owner/name" } — pull
          # that run's 'debs' artifact into a staging dir, then overwrite
          # into the pool (the artifact re-includes unchanged debs already
          # pulled from R2; gh run download refuses to clobber in place).
          mkdir -p staged
          gh run download "${{ github.event.client_payload.run_id }}" \
            --repo "${{ github.event.client_payload.repo }}" \
            --name debs --dir staged
          cp -vf staged/*.deb repo/pool/
          rm -rf staged
        env: { GH_TOKEN: "${{ secrets.DISPATCH_TOKEN }}" }
      - name: Add incoming/ debs (manual publish inbox)
        run: |
          if ls incoming/*.deb >/dev/null 2>&1; then
            cp -v incoming/*.deb repo/pool/
          fi
      - name: Regenerate + sign indexes
        run: ./publish.sh repo
      - name: Sync to R2
        env:
          CLOUDFLARE_API_TOKEN: "${{ secrets.CLOUDFLARE_API_TOKEN }}"
          CLOUDFLARE_ACCOUNT_ID: "${{ vars.CLOUDFLARE_ACCOUNT_ID }}"
        run: |
          cd repo && find pool dists -type f | while read f; do
            npx wrangler r2 object put "openpolycom-apt/$f" --file "$f" --remote
          done
